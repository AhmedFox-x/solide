name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'solide-frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: solide-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: solide-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://solide-api.onrender.com' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: solide-frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
